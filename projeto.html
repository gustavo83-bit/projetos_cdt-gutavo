<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🍦 Sorveteria</title>

<style>

/* Reset */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* Corpo do site */

body{
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ffffff,#f5f5f5);
    padding:20px;
}

/* Cabeçalho */

h1{
    text-align:center;
    color:#ff0000;
    margin-bottom:10px;
}

.subtitulo{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

/* Campo de busca */

.busca{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:2px solid #ff0000;
    margin-bottom:25px;
    font-size:16px;
    outline:none;
}

/* Grid dos sorvetes */

.sorvetes{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

/* Card */

.card{
    background:white;
    border-radius:20px;
    padding:20px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
}

.emoji{
    font-size:50px;
}

.card h2{
    color:#ff0000;
    margin:10px 0;
}

.preco{
    font-size:20px;
    font-weight:bold;
    margin-bottom:15px;
}

/* Botões */

button{
    background:#ff0000;
    color:white;
    border:none;
    padding:12px;
    border-radius:12px;
    cursor:pointer;
    font-size:15px;
    transition:0.3s;
}

button:hover{
    background:#cc0000;
}

/* Carrinho */

.pedido{
    margin-top:35px;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

#listaPedidos li{
    margin-bottom:8px;
}

#total{
    margin-top:15px;
    color:#ff0000;
}

/* Botão finalizar */

.finalizar{
    margin-top:20px;
    width:100%;
    background:#28a745;
}

.finalizar:hover{
    background:#218838;
}

/* Botões inferiores */

.botoes{
    margin-top:25px;
    display:flex;
    gap:15px;
    justify-content:center;
    flex-wrap:wrap;
}

/* Usuário */

.usuario{
    text-align:center;
    margin-top:20px;
    color:#056dff;
    font-weight:bold;
}

</style>
</head>

<body>

<h1>🍦 Sorveteria</h1>

<p class="subtitulo">
Os melhores sabores da cidade!
</p>

<input
type="text"
id="buscar"
class="busca"
placeholder="Buscar sabor..."
onkeyup="buscarSorvete()"
>

<!-- Container dos cards -->

<div class="sorvetes" id="sorvetesContainer"></div>

<!-- Carrinho -->

<div class="pedido">

<h2>🛒 Carrinho</h2>

<ul id="listaPedidos"></ul>

<h3 id="total">
Total: R$ 0,00
</h3>

<button class="finalizar" onclick="finalizarPedido()">
✅ Finalizar Pedido
</button>

</div>

<!-- Botões inferiores -->

<div class="botoes">

<button onclick="fazerLogin()">
👤 Entrar
</button>

<button onclick="abrirAjuda()">
❓ Ajuda
</button>

</div>

<h3 id="usuario" class="usuario">
👤 Nenhum usuário logado
</h3>

<script>

/* Lista de sabores */

let sabores = [];

/* Total do carrinho */

let total = 0;

/* Carregar JSON */

fetch('sabores.json')

.then(resposta => {

    if(!resposta.ok){

        throw new Error(
            'Erro ao carregar sabores.json'
        );

    }

    return resposta.json();

})

.then(dados => {

    sabores = dados.sabores;

    renderizarCards(sabores);

})

.catch(erro => {

    console.error(erro);

    document.getElementById(
        'sorvetesContainer'
    ).innerHTML =
    '<p>Erro ao carregar sabores.</p>';

});

/* Renderizar cards */

function renderizarCards(lista){

    const container =
    document.getElementById(
        'sorvetesContainer'
    );

    container.innerHTML = '';

    lista.forEach(item => {

        const card =
        document.createElement('div');

        card.className = 'card';

        /* Emoji */

        const emoji =
        document.createElement('div');

        emoji.className = 'emoji';
        emoji.textContent = item.emoji;

        /* Nome */

        const titulo =
        document.createElement('h2');

        titulo.textContent = item.nome;

        /* Preço */

        const preco =
        document.createElement('p');

        preco.className = 'preco';

        preco.textContent =
        'R$ ' +
        item.preco.toFixed(2)
        .replace('.', ',');

        /* Botão */

        const botao =
        document.createElement('button');

        botao.textContent = 'Adicionar';

        botao.onclick = function(){

            adicionarPedido(
                item.nome,
                item.preco
            );

        };

        /* Adicionar elementos */

        card.appendChild(emoji);
        card.appendChild(titulo);
        card.appendChild(preco);
        card.appendChild(botao);

        container.appendChild(card);

    });

}

/* Buscar sabores */

function buscarSorvete(){

    let input =
    document.getElementById('buscar')
    .value
    .toLowerCase();

    let filtrados =
    sabores.filter(item =>

        item.nome
        .toLowerCase()
        .includes(input)

    );

    renderizarCards(filtrados);

}

/* Adicionar pedido */

function adicionarPedido(
    sabor,
    preco
){

    let lista =
    document.getElementById(
        'listaPedidos'
    );

    let item =
    document.createElement('li');

    item.textContent =
    sabor +
    ' - R$ ' +
    preco.toFixed(2)
    .replace('.', ',');

    lista.appendChild(item);

    total += preco;

    atualizarTotal();

}

/* Atualizar total */

function atualizarTotal(){

    document.getElementById('total')
    .innerHTML =

    'Total: R$ ' +

    total.toFixed(2)
    .replace('.', ',');

}

/* Finalizar pedido */

function finalizarPedido(){

    if(total === 0){

        alert(
            'Seu carrinho está vazio!'
        );

        return;

    }

    alert(
        '🍦 Pedido realizado com sucesso!'
    );

    document.getElementById(
        'listaPedidos'
    ).innerHTML = '';

    total = 0;

    atualizarTotal();

}

/* Login */

function fazerLogin(){

    let nome =
    prompt(
        'Digite seu nome:'
    );

    if(
        nome &&
        nome.trim() !== ''
    ){

        document.getElementById(
            'usuario'
        ).innerHTML =

        '👤 Usuário: ' + nome;

        alert(
            'Bem-vindo(a), ' +
            nome +
            '! 🍦'
        );

    }else{

        alert(
            'Digite um nome válido!'
        );

    }

}

/* Ajuda */

function abrirAjuda(){

    alert(

        '🍦 AJUDA DA SORVETERIA\n\n' +

        '• Busque sabores na barra de pesquisa.\n' +

        '• Clique em Adicionar para colocar no carrinho.\n' +

        '• Finalize o pedido no botão verde.\n' +

        '• Faça login para entrar no sistema.'

    );

}

</script>

</body>
</html>
