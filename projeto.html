<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <!-- Configuração de caracteres -->
    <meta charset="UTF-8">

    <!-- Responsividade para celular -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título da página -->
    <title>🍦 Sorveteria</title>

    <style>

        /* =========================
           RESET PADRÃO
        ========================== */

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        /* =========================
           CORPO DO SITE
        ========================== */

        body{
            font-family:Arial, sans-serif;

            /* Fundo em degradê */
            background:linear-gradient(
                135deg,
                #ffffff,
                #f5f5f5
            );

            padding:20px;
        }

        /* =========================
           TÍTULO PRINCIPAL
        ========================== */

        h1{
            text-align:center;
            color:#ff0000;
            margin-bottom:10px;
        }

        /* Subtítulo */

        .subtitulo{
            text-align:center;
            color:#666;
            margin-bottom:25px;
        }

        /* =========================
           CAMPO DE BUSCA
        ========================== */

        .busca{

            width:100%;

            padding:14px;

            border-radius:12px;

            border:2px solid #ff0000;

            margin-bottom:25px;

            font-size:16px;

            outline:none;
        }

        /* =========================
           GRID DOS SORVETES
        ========================== */

        .sorvetes{

            display:grid;

            /* Responsivo automático */
            grid-template-columns:
            repeat(auto-fit,minmax(220px,1fr));

            gap:20px;
        }

        /* =========================
           CARD DOS PRODUTOS
        ========================== */

        .card{

            background:white;

            border-radius:20px;

            padding:20px;

            text-align:center;

            box-shadow:0 5px 15px rgba(0,0,0,0.1);

            transition:0.3s;
        }

        /* Efeito hover */

        .card:hover{
            transform:scale(1.03);
        }

        /* Emoji grande */

        .emoji{
            font-size:50px;
        }

        /* Nome do sorvete */

        .card h2{
            color:#ff0000;
            margin:10px 0;
        }

        /* Preço */

        .preco{
            font-size:20px;
            font-weight:bold;
            margin-bottom:15px;
        }

        /* =========================
           BOTÕES
        ========================== */

        button{

            background:#ff0000;

            color:white;

            border:none;

            padding:12px;

            border-radius:12px;

            cursor:pointer;

            font-size:15px;

            transition:0.3s;
        }

        button:hover{
            background:#cc0000;
        }

        /* =========================
           CARRINHO
        ========================== */

        .pedido{

            margin-top:35px;

            background:white;

            padding:25px;

            border-radius:20px;

            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        #listaPedidos li{
            margin-bottom:8px;
        }

        #total{
            margin-top:15px;
            color:#ff0000;
        }

        /* Botão finalizar */

        .finalizar{
            margin-top:20px;
            width:100%;
            background:#28a745;
        }

        .finalizar:hover{
            background:#218838;
        }

        /* =========================
           BOTÕES INFERIORES
        ========================== */

        .botoes{

            margin-top:25px;

            display:flex;

            gap:15px;

            justify-content:center;

            flex-wrap:wrap;
        }

        /* =========================
           USUÁRIO LOGADO
        ========================== */

        .usuario{
            text-align:center;
            margin-top:20px;
            color:#056dff;
            font-weight:bold;
        }

    </style>

</head>

<body>

    <!-- =========================
         CABEÇALHO
    ========================== -->

    <h1>🍦 Sorveteria</h1>

    <p class="subtitulo">
        Os melhores sabores da cidade!
    </p>

    <!-- =========================
         CAMPO DE BUSCA
    ========================== -->

    <input
        type="text"
        id="buscar"
        class="busca"
        placeholder="Buscar sabor..."
        onkeyup="buscarSorvete()"
    >

    <!-- =========================
         CONTAINER DOS CARDS
    ========================== -->

    <div
        class="sorvetes"
        id="sorvetesContainer"
    ></div>

    <!-- =========================
         CARRINHO
    ========================== -->

    <div class="pedido">

        <h2>🛒 Carrinho</h2>

        <!-- Lista de pedidos -->
        <ul id="listaPedidos"></ul>

        <!-- Total -->
        <h3 id="total">
            Total: R$ 0,00
        </h3>

        <!-- Botão finalizar -->
        <button
            class="finalizar"
            onclick="finalizarPedido()"
        >
            ✅ Finalizar Pedido
        </button>

    </div>

    <!-- =========================
         BOTÕES EXTRAS
    ========================== -->

    <div class="botoes">

        <button onclick="fazerLogin()">
            👤 Entrar
        </button>

        <button onclick="abrirAjuda()">
            ❓ Ajuda
        </button>

    </div>

    <!-- Usuário -->
    <h3 id="usuario" class="usuario">
        👤 Nenhum usuário logado
    </h3>

    <script>

        /* =========================
           ARRAY DE SABORES
        ========================== */

        let sabores = [];

        /* =========================
           TOTAL DO CARRINHO
        ========================== */

        let total = 0;

        /* =========================
           CARREGAR JSON
        ========================== */

        fetch('sabores.json')

        .then(resposta => {

            /* Verifica se houve erro */

            if(!resposta.ok){

                throw new Error(
                    'Erro ao carregar sabores.json'
                );

            }

            /* Converte para JSON */

            return resposta.json();

        })

        .then(dados => {

            /* Salva os sabores */

            sabores = dados.sabores;

            /* Renderiza os cards */

            renderizarCards(sabores);

        })

        .catch(erro => {

            console.error(erro);

            document.getElementById(
                'sorvetesContainer'
            ).innerHTML =
            '<p>Erro ao carregar sabores.</p>';

        });

        /* =========================
           RENDERIZAR CARDS
        ========================== */

        function renderizarCards(lista){

            const container =
            document.getElementById(
                'sorvetesContainer'
            );

            /* Limpa antes de renderizar */

            container.innerHTML = '';

            /* Percorre os sabores */

            lista.forEach(item => {

                /* Cria card */

                const card =
                document.createElement('div');

                card.className = 'card';

                /* Emoji */

                const emoji =
                document.createElement('div');

                emoji.className = 'emoji';

                emoji.textContent =
                item.emoji;

                /* Nome */

                const titulo =
                document.createElement('h2');

                titulo.textContent =
                item.nome;

                /* Preço */

                const preco =
                document.createElement('p');

                preco.className = 'preco';

                preco.textContent =
                'R$ ' +
                item.preco
                .toFixed(2)
                .replace('.', ',');

                /* Botão adicionar */

                const botao =
                document.createElement('button');

                botao.textContent =
                'Adicionar';

                botao.onclick = function(){

                    adicionarPedido(
                        item.nome,
                        item.preco
                    );

                };

                /* Adiciona tudo no card */

                card.appendChild(emoji);
                card.appendChild(titulo);
                card.appendChild(preco);
                card.appendChild(botao);

                /* Adiciona card no container */

                container.appendChild(card);

            });

        }

        /* =========================
           BUSCAR SORVETE
        ========================== */

        function buscarSorvete(){

            let input =
            document.getElementById(
                'buscar'
            )
            .value
            .toLowerCase();

            /* Filtra sabores */

            let filtrados =
            sabores.filter(item =>

                item.nome
                .toLowerCase()
                .includes(input)

            );

            renderizarCards(filtrados);

        }

        /* =========================
           ADICIONAR PEDIDO
        ========================== */

        function adicionarPedido(
            sabor,
            preco
        ){

            let lista =
            document.getElementById(
                'listaPedidos'
            );

            /* Cria item da lista */

            let item =
            document.createElement('li');

            item.textContent =
            sabor +
            ' - R$ ' +
            preco
            .toFixed(2)
            .replace('.', ',');

            /* Adiciona item */

            lista.appendChild(item);

            /* Soma total */

            total += preco;

            atualizarTotal();

        }

        /* =========================
           ATUALIZAR TOTAL
        ========================== */

        function atualizarTotal(){

            document.getElementById(
                'total'
            ).innerHTML =

            'Total: R$ ' +

            total
            .toFixed(2)
            .replace('.', ',');

        }

        /* =========================
           FINALIZAR PEDIDO
        ========================== */

        function finalizarPedido(){

            /* Verifica se o carrinho está vazio */

            if(total === 0){

                alert(
                    'Seu carrinho está vazio!'
                );

                return;

            }

            /* Mensagem */

            alert(
                '🍦 Pedido realizado com sucesso!'
            );

            /* Limpa carrinho */

            document.getElementById(
                'listaPedidos'
            ).innerHTML = '';

            /* Zera total */

            total = 0;

            atualizarTotal();

        }

        /* =========================
           LOGIN
        ========================== */

        function fazerLogin(){

            let nome =
            prompt(
                'Digite seu nome:'
            );

            /* Validação */

            if(
                nome &&
                nome.trim() !== ''
            ){

                document.getElementById(
                    'usuario'
                ).innerHTML =

                '👤 Usuário: ' + nome;

                alert(
                    'Bem-vindo(a), ' +
                    nome +
                    '! 🍦'
                );

            }else{

                alert(
                    'Digite um nome válido!'
                );

            }

        }

        /* =========================
           AJUDA
        ========================== */

        function abrirAjuda(){

            alert(

                '🍦 AJUDA DA SORVETERIA\n\n' +

                '• Busque sabores na barra de pesquisa.\n' +

                '• Clique em Adicionar para colocar no carrinho.\n' +

                '• Finalize o pedido no botão verde.\n' +

                '• Faça login para entrar no sistema.'

            );

        }

    </script>

</body>

</html>
